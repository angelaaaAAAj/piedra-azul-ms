# Puerto del microservicio de pacientes
server.port=8082

# Base de datos, en username y password debes colocar los datos reales de tu base de datos PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/pacientesdb
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=postgres
spring.datasource.password=piedraazul123

# JPA
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Nombre de la aplicación
spring.application.name=ms-pacientes