spring.application.name=api-gateway
server.port=8080

# MS-AUTH
spring.cloud.gateway.routes[0].id=ms-auth
spring.cloud.gateway.routes[0].uri=http://localhost:8081
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**

# MS-PACIENTES
spring.cloud.gateway.routes[1].id=ms-pacientes
spring.cloud.gateway.routes[1].uri=http://localhost:8082
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/pacientes/**

# MS-AGENDA (médicos y citas)
spring.cloud.gateway.routes[2].id=ms-agenda-citas
spring.cloud.gateway.routes[2].uri=http://localhost:8083
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/citas/**

spring.cloud.gateway.routes[3].id=ms-agenda-medicos
spring.cloud.gateway.routes[3].uri=http://localhost:8083
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/medicos/**

# MS-HISTORIAL
spring.cloud.gateway.routes[4].id=ms-historial
spring.cloud.gateway.routes[4].uri=http://localhost:8084
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/historial/**

# MS-AUDITORIA
spring.cloud.gateway.routes[5].id=ms-auditoria
spring.cloud.gateway.routes[5].uri=http://localhost:8085
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/auditoria/**

logging.level.org.springframework.cloud.gateway=DEBUG