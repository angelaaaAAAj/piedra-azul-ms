spring.application.name=api-gateway

server.port=8080

# =========================
# GATEWAY ROUTES
# =========================

# -------------------------
# MS PACIENTES
# -------------------------
spring.cloud.gateway.routes[0].id=ms-pacientes
spring.cloud.gateway.routes[0].uri=http://localhost:8082
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/pacientes/**

# -------------------------
# MS MEDICOS
# -------------------------
spring.cloud.gateway.routes[1].id=ms-medicos
spring.cloud.gateway.routes[1].uri=http://localhost:8083
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/medicos/**

# -------------------------
# MS CITAS
# -------------------------
spring.cloud.gateway.routes[2].id=ms-citas
spring.cloud.gateway.routes[2].uri=http://localhost:8084
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/citas/**

# -------------------------
# MS HISTORIAL
# -------------------------
spring.cloud.gateway.routes[3].id=ms-historial
spring.cloud.gateway.routes[3].uri=http://localhost:8085
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/historial/**

# -------------------------
# MS AUDITORIA
# -------------------------
spring.cloud.gateway.routes[4].id=ms-auditoria
spring.cloud.gateway.routes[4].uri=http://localhost:8086
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/auditoria/**

# =========================
# LOGGING
# =========================

logging.level.org.springframework.cloud.gateway=DEBUG
logging.level.reactor.netty.http.client=DEBUG
